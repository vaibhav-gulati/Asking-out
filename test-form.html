<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Test Form</title>
</head>
<body>
  <h1>Netlify Forms Test</h1>
  <p>Click Submit. If it works, you'll see the submission in Netlify Dashboard → Forms → ask-out-test.</p>
  <form name="ask-out-test" method="POST" data-netlify="true" netlify-honeypot="x">
    <input type="hidden" name="choice" value="test" />
    <input type="hidden" name="time_taken_seconds" value="0" />
    <input type="hidden" name="landed_at" value="manual-test" />
    <input type="text" name="x" tabindex="-1" autocomplete="off" style="display:none" />
    <button type="submit">Submit Test</button>
  </form>
</body>
</html>
